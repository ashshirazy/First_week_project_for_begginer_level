<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlowSpace | Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 70vh;
      margin: 40px 0;
    }
    .auth-card {
      background: white;
      max-width: 480px;
      width: 100%;
      padding: 48px 40px;
      border-radius: 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
      border: 1px solid #E5E7EB;
      text-align: center;
    }
    .auth-card h2 {
      font-size: 2rem;
      margin-bottom: 12px;
      color: #0A0B1E;
    }
    .auth-card p {
      color: #6B7280;
      margin-bottom: 32px;
    }
    .input-group {
      margin: 24px 0;
      text-align: left;
    }
    .input-group label {
      font-weight: 600;
      display: block;
      margin-bottom: 8px;
      color: #1F2937;
    }
    .input-group input {
      width: 100%;
      padding: 14px 18px;
      border-radius: 12px;
      border: 1px solid #E5E7EB;
      font-family: inherit;
      font-size: 1rem;
    }
    .input-group input:focus {
      outline: none;
      border-color: #4F46E5;
    }
    .auth-btn {
      width: 100%;
      margin-top: 8px;
    }
    .back-link {
      text-align: center;
      margin-top: 24px;
    }
    .back-link a {
      color: #4F46E5;
      text-decoration: none;
      font-weight: 600;
    }
    .success-message {
      background: #D1FAE5;
      color: #065F46;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 20px;
      display: none;
    }
    @media (max-width: 640px) {
      .auth-card { padding: 32px 24px; margin: 0 16px; }
    }
  </style>
</head>
<body>

<div class="container">
  <nav class="navbar">
    <a href="index.html" class="logo">FlowSpace</a>
    <div class="nav-links">
      <a href="features.html">Features</a>
      <a href="pricing.html">Pricing</a>
      <a href="login.html" class="btn-outline btn-small">Sign In</a>
    </div>
  </nav>
</div>

<div class="container">
  <div class="auth-wrapper">
    <div class="auth-card">
      <i class="fas fa-key" style="font-size: 2.5rem; color: #4F46E5;"></i>
      <h2>Reset password</h2>
      <p>Enter your email and we'll send you a reset link.</p>
      
      <div id="successMessage" class="success-message">
        <i class="fas fa-check-circle"></i> Reset link sent! Check your email.
      </div>
      
      <form id="resetForm">
        <div class="input-group">
          <label>Email address</label>
          <input type="email" id="resetEmail" required placeholder="hello@flowspace.com">
        </div>
        <button type="submit" class="btn-primary auth-btn">Send reset link <i class="fas fa-paper-plane"></i></button>
      </form>
      
      <div class="back-link">
        <a href="login.html"><i class="fas fa-arrow-left"></i> Back to login</a>
      </div>
    </div>
  </div>
</div>

<footer>
  <div class="container">
    <div class="footer-content">
      <div>© 2025 FlowSpace. All rights reserved.</div>
      <div class="social-icons">
        <i class="fab fa-twitter"></i>
        <i class="fab fa-linkedin"></i>
        <i class="fab fa-github"></i>
      </div>
    </div>
  </div>
</footer>

<script>
  document.getElementById('resetForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const email = document.getElementById('resetEmail').value;
    if (email) {
      const successDiv = document.getElementById('successMessage');
      successDiv.style.display = 'block';
      alert(`Password reset link sent to ${email}`);
      setTimeout(() => {
        successDiv.style.display = 'none';
        window.location.href = 'login.html';
      }, 2000);
    }
  });
</script>
</body>
</html>
