<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlowSpace | Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0F172A 0%, #1E1B4B 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .admin-login-container {
      width: 100%;
      max-width: 480px;
      padding: 20px;
    }

    .login-card {
      background: white;
      border-radius: 32px;
      padding: 48px 40px;
      border: 1px solid rgba(79, 70, 229, 0.3);
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3);
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo h1 {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #4F46E5, #8B5CF6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .admin-icon {
      background: #4F46E5;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    .admin-icon i {
      font-size: 2.5rem;
      color: white;
    }

    .login-card h2 {
      color: #0F172A;
      text-align: center;
      font-size: 1.8rem;
      margin-bottom: 8px;
    }

    .login-card p {
      color: #6B7280;
      text-align: center;
      margin-bottom: 32px;
    }

    .input-group {
      margin-bottom: 24px;
    }

    .input-group label {
      display: block;
      color: #1F2937;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .input-group input {
      width: 100%;
      padding: 14px 18px;
      background: #F9FAFB;
      border: 1px solid #E5E7EB;
      border-radius: 12px;
      color: #1F2937;
      font-size: 1rem;
      font-family: inherit;
    }

    .input-group input:focus {
      outline: none;
      border-color: #4F46E5;
    }

    .login-btn {
      width: 100%;
      background: #4F46E5;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 16px;
    }

    .login-btn:hover {
      background: #4338CA;
    }

    .error-message {
      background: #FEE2E2;
      border: 1px solid #EF4444;
      color: #DC2626;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 20px;
      display: none;
      text-align: center;
    }

    .demo-credentials {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid #E5E7EB;
      text-align: center;
    }

    .demo-credentials p {
      color: #6B7280;
      font-size: 0.85rem;
      margin-bottom: 8px;
    }

    .demo-credentials code {
      background: #F9FAFB;
      padding: 8px 16px;
      border-radius: 12px;
      display: inline-block;
      color: #4F46E5;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .back-link {
      text-align: center;
      margin-top: 24px;
    }

    .back-link a {
      color: #4F46E5;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .back-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="admin-login-container">
    <div class="login-card">
      <div class="logo">
        <h1>FlowSpace</h1>
      </div>
      <div class="admin-icon">
        <i class="fas fa-shield-alt"></i>
      </div>
      <h2>Admin Login</h2>
      <p>Enter your credentials to access the admin panel</p>
      
      <div id="errorMessage" class="error-message">
        <i class="fas fa-exclamation-triangle"></i> Invalid email or password
      </div>
      
      <form id="adminLoginForm">
        <div class="input-group">
          <label>Email Address</label>
          <input type="email" id="adminEmail" placeholder="admin@flowspace.com" value="admin@flowspace.com">
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" id="adminPassword" placeholder="Enter password" required>
        </div>
        <button type="submit" class="login-btn">Login as Admin</button>
      </form>
      
      <div class="demo-credentials">
        <p><i class="fas fa-flask"></i> Admin Credentials</p>
        <code>admin@flowspace.com / admin123</code>
      </div>
      
      <div class="back-link">
        <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a>
      </div>
    </div>
  </div>

  <script>
    const ADMIN_EMAIL = "abdulsamadsuleiman113@gmail.com";
    const ADMIN_PASSWORD = "admin123";
    
    // Clear any existing admin sessions on login page
    sessionStorage.removeItem('adminLoggedIn');
    
    document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const email = document.getElementById('adminEmail').value;
      const password = document.getElementById('adminPassword').value;
      const errorDiv = document.getElementById('errorMessage');
      
      if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
        sessionStorage.setItem('adminLoggedIn', 'true');
        localStorage.setItem('adminLoggedIn', 'true');
        localStorage.setItem('adminEmail', email);
        window.location.href = "admin-dashboard.html";
      } else {
        errorDiv.style.display = 'block';
        document.getElementById('adminPassword').value = '';
        setTimeout(() => {
          errorDiv.style.display = 'none';
        }, 3000);
      }
    });
  </script>
</body>
</html>
