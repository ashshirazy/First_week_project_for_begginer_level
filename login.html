<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlowSpace | Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      margin: 40px 0;
    }
    .auth-card {
      background: white;
      max-width: 480px;
      width: 100%;
      padding: 48px 40px;
      border-radius: 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
      border: 1px solid #E5E7EB;
      text-align: center;
    }
    .auth-card h2 {
      font-size: 2rem;
      margin-bottom: 12px;
      color: #0A0B1E;
    }
    .auth-card p {
      color: #6B7280;
      margin-bottom: 32px;
    }
    .input-group {
      margin: 24px 0;
      text-align: left;
    }
    .input-group label {
      font-weight: 600;
      display: block;
      margin-bottom: 8px;
      color: #1F2937;
    }
    .input-group input {
      width: 100%;
      padding: 14px 18px;
      border-radius: 12px;
      border: 1px solid #E5E7EB;
      font-family: inherit;
      font-size: 1rem;
      transition: 0.2s;
    }
    .input-group input:focus {
      outline: none;
      border-color: #4F46E5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }
    .auth-btn {
      width: 100%;
      margin-top: 8px;
    }
    .alt-options {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      margin: 16px 0;
    }
    .alt-options a {
      color: #4F46E5;
      text-decoration: none;
    }
    .demo-note {
      margin-top: 32px;
      background: #F9FAFB;
      border-radius: 16px;
      padding: 16px;
      font-size: 0.85rem;
    }
    .error-message {
      background: #FEE2E2;
      color: #DC2626;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 20px;
      display: none;
    }
    .admin-link {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #E5E7EB;
    }
    .admin-link a {
      color: #EF4444;
      text-decoration: none;
      font-size: 0.85rem;
    }
    @media (max-width: 640px) {
      .auth-card { padding: 32px 24px; margin: 0 16px; }
    }
  </style>
</head>
<body>

<div class="container">
  <nav class="navbar">
    <a href="index.html" class="logo">FlowSpace</a>
    <div class="nav-links">
      <a href="features.html">Features</a>
      <a href="pricing.html">Pricing</a>
      <a href="login.html" class="btn-outline btn-small">Sign In</a>
      <a href="signup.html" class="btn-primary btn-small">Sign Up</a>
      <a href="admin-login.html" class="btn-outline btn-small" style="border-color: #EF4444; color: #EF4444;">
        <i class="fas fa-shield-alt"></i> Admin
      </a>
    </div>
  </nav>
</div>

<div class="container">
  <div class="auth-wrapper">
    <div class="auth-card">
      <i class="fas fa-rocket" style="font-size: 2.5rem; color: #4F46E5;"></i>
      <h2>Welcome back</h2>
      <p>Sign in to access your workspace</p>
      
      <div id="errorMessage" class="error-message">
        <i class="fas fa-exclamation-circle"></i> Invalid email or password
      </div>
      
      <form id="loginForm">
        <div class="input-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="hello@flowspace.com" required>
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="••••••" required>
        </div>
        <button type="submit" class="btn-primary auth-btn">Sign in <i class="fas fa-arrow-right"></i></button>
        <div class="alt-options">
          <a href="forgot-password.html">Forgot password?</a>
          <a href="signup.html">Create account</a>
        </div>
      </form>
      
      <div class="demo-note">
        <i class="fas fa-flask"></i> Demo: Use any email and password (min 1 char)<br>
        <small>Or sign up for a new account</small>
      </div>
      
      <div class="admin-link">
        <a href="admin-login.html"><i class="fas fa-shield-alt"></i> Admin Portal Login →</a>
      </div>
    </div>
  </div>
</div>

<footer>
  <div class="container">
    <div class="footer-content">
      <div>© 2025 FlowSpace. All rights reserved.</div>
      <div class="social-icons">
        <i class="fab fa-twitter"></i>
        <i class="fab fa-linkedin"></i>
        <i class="fab fa-github"></i>
      </div>
    </div>
  </div>
</footer>

<script>
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    const errorDiv = document.getElementById('errorMessage');
    
    // Check if admin is trying to login
    if (email === 'admin@flowspace.com' && password === 'admin123') {
      sessionStorage.setItem('adminLoggedIn', 'true');
      localStorage.setItem('adminLoggedIn', 'true');
      window.location.href = "admin-dashboard.html";
      return;
    }
    
    const users = JSON.parse(localStorage.getItem('flowspace_users') || '[]');
    const user = users.find(u => u.email === email && u.password === password);
    
    if (user) {
      localStorage.setItem('flowspace_current_user', JSON.stringify(user));
      alert(`Welcome back, ${user.firstName}!`);
      window.location.href = "dashboard.html";
    } else if (email && password.length >= 1) {
      // Demo mode - create temporary session
      const demoUser = { 
        email: email, 
        firstName: email.split('@')[0] || "Demo",
        lastName: "User",
        isDemo: true 
      };
      localStorage.setItem('flowspace_current_user', JSON.stringify(demoUser));
      alert("Welcome! Redirecting to dashboard...");
      window.location.href = "dashboard.html";
    } else {
      errorDiv.style.display = 'block';
      setTimeout(() => { errorDiv.style.display = 'none'; }, 3000);
    }
  });
</script>
</body>
</html>
